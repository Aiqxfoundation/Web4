<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modified Gem Mining Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
  canvas { border-radius: 8px; }
  #status, button, #gifPreview { display: none; }
</style>
</head>
<body>
<canvas id="preview" width="640" height="360"></canvas>
<div id="status">Animating preview...</div>
<button id="genBtn">Generate GIF</button>
<div id="gifPreview">
  <img id="gifImg" alt="Generated GIF" />
  <p>Right-click the GIF to save it</p>
  <a class="dl" id="dlLink" download="gem_mining_modified.gif">Download GIF</a>
</div>

<!-- gif.js inline worker blob support -->
<script>
// ─── GIF.js (simplified inline version using gif-encoder approach) ─────────────
// We'll use a manual pixel-based GIF encoder approach
// Drawing utilities
const W = 640, H = 360;
const FRAMES = 32;
const DELAY = 55;

const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');

// ── Gem drawing (app-style purple diamond with orange highlight) ──────────────
function drawGem(ctx, cx, cy, size, alpha = 1) {
  const s = size / 40;
  const tx = cx - size / 2;
  const ty = cy - size / 2;

  function pt(x, y) { return [tx + x * s, ty + y * s]; }

  function poly(points, color, op = 1) {
    ctx.save();
    ctx.globalAlpha = alpha * op;
    ctx.beginPath();
    const [sx, sy] = pt(...points[0]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < points.length; i++) {
      const [px2, py2] = pt(...points[i]);
      ctx.lineTo(px2, py2);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  poly([[20,4],[30,14],[20,10]], '#c4b5fd');
  poly([[20,4],[10,14],[20,10]], '#a78bfa', 0.9);
  poly([[30,14],[20,10],[10,14]], '#8b5cf6', 0.7);
  poly([[10,14],[20,10],[20,34],[6,22]], '#6d28d9');
  poly([[30,14],[20,10],[20,34],[34,22]], '#7c3aed');
  poly([[20,34],[6,22],[34,22]], '#4c1d95');
  // Orange highlight (replaces white)
  poly([[20,5],[26,12],[22,11]], '#ff8c00', 0.95);
}

// ── Cave silhouette ──────────────────────────────────────────────────────────
function drawCave(ctx) {
  ctx.save();
  ctx.fillStyle = '#1c1c1c';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(610, 0);
  ctx.lineTo(610, 95);
  ctx.bezierCurveTo(565, 75, 515, 108, 485, 142);
  ctx.bezierCurveTo(458, 172, 425, 162, 395, 152);
  ctx.bezierCurveTo(360, 140, 335, 162, 306, 172);
  ctx.bezierCurveTo(276, 182, 246, 175, 220, 188);
  ctx.bezierCurveTo(186, 202, 168, 228, 138, 228);
  ctx.bezierCurveTo(98, 228, 73, 252, 46, 262);
  ctx.lineTo(0, 262);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Mine cart (orange gradient — replaces gray/white) ───────────────────────
function drawCart(ctx) {
  ctx.save();

  const bodyGrad = ctx.createLinearGradient(290, 258, 290, 318);
  bodyGrad.addColorStop(0, '#ff9900');
  bodyGrad.addColorStop(1, '#cc4400');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(296, 265);
  ctx.lineTo(442, 265);
  ctx.lineTo(428, 318);
  ctx.lineTo(310, 318);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ff6600';
  ctx.fillRect(289, 260, 158, 10);

  ctx.fillStyle = '#cc4400';
  ctx.fillRect(300, 316, 140, 6);

  for (const wx of [328, 418]) {
    const wg = ctx.createRadialGradient(wx, 330, 3, wx, 330, 16);
    wg.addColorStop(0, '#ffb300');
    wg.addColorStop(1, '#cc5500');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.arc(wx, 330, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#cc4400';
    ctx.beginPath();
    ctx.arc(wx, 330, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#aa3300';
    ctx.lineWidth = 2;
    for (let a = 0; a < Math.PI; a += Math.PI / 3) {
      ctx.beginPath();
      ctx.moveTo(wx + Math.cos(a) * 7, 330 + Math.sin(a) * 7);
      ctx.lineTo(wx + Math.cos(a) * 16, 330 + Math.sin(a) * 16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx - Math.cos(a) * 7, 330 - Math.sin(a) * 7);
      ctx.lineTo(wx - Math.cos(a) * 16, 330 - Math.sin(a) * 16);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Pickaxe ──────────────────────────────────────────────────────────────────
function drawPickaxe(ctx, angle, px, py) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);

  const hg = ctx.createLinearGradient(0, -4, 0, 4);
  hg.addColorStop(0, '#b07030');
  hg.addColorStop(1, '#704010');
  ctx.strokeStyle = hg;
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.lineTo(72, 0);
  ctx.stroke();

  const hd = ctx.createLinearGradient(68, -18, 68, 12);
  hd.addColorStop(0, '#ccc');
  hd.addColorStop(1, '#666');
  ctx.fillStyle = hd;
  ctx.beginPath();
  ctx.moveTo(68, -18);
  ctx.lineTo(100, -8);
  ctx.lineTo(95, 12);
  ctx.lineTo(68, 8);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.moveTo(96, -10);
  ctx.lineTo(118, 0);
  ctx.lineTo(96, 10);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(68, -18);
  ctx.lineTo(58, -12);
  ctx.lineTo(58, 12);
  ctx.lineTo(68, 8);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ── Gem clusters & flying gems ───────────────────────────────────────────────
const clusterGems = [
  { ox:  0,  oy:  0,  size: 26, phase: 0.0 },
  { ox:-22,  oy:-16,  size: 20, phase: 0.8 },
  { ox: 24,  oy:-12,  size: 18, phase: 1.5 },
  { ox:-12,  oy: 18,  size: 16, phase: 2.2 },
  { ox: 28,  oy: 12,  size: 22, phase: 0.4 },
  { ox:-28,  oy:  4,  size: 17, phase: 1.1 },
  { ox:  8,  oy:-28,  size: 20, phase: 1.9 },
  { ox: -4,  oy: 28,  size: 18, phase: 2.7 },
  { ox: 18,  oy:-24,  size: 14, phase: 0.6 },
  { ox:-20,  oy: 22,  size: 15, phase: 3.0 },
  { ox: 38,  oy: -4,  size: 13, phase: 1.3 },
  { ox:-36,  oy: -8,  size: 14, phase: 2.0 },
];

const flyingGems = [
  { x: 595, y: 175, size: 36, phase: 0.0 },
  { x: 550, y: 232, size: 30, phase: 1.0 },
  { x: 534, y: 298, size: 28, phase: 2.0 },
  { x: 607, y: 112, size: 26, phase: 0.5 },
  { x: 646, y: 198, size: 23, phase: 1.5 },
  { x: 572, y: 152, size: 21, phase: 2.5 },
  { x: 627, y: 263, size: 34, phase: 3.0 },
  { x: 540, y: 342, size: 24, phase: 0.2 },
  { x: 616, y: 312, size: 27, phase: 1.8 },
  { x: 657, y: 140, size: 19, phase: 0.9 },
  { x: 576, y: 356, size: 21, phase: 2.3 },
  { x: 514, y: 198, size: 23, phase: 1.2 },
  { x: 634, y: 76,  size: 18, phase: 0.7 },
];

// ── Draw one frame ────────────────────────────────────────────────────────────
function drawFrame(ctx, t) {
  ctx.clearRect(0, 0, W, H);

  // Gradient orange background (replaces white)
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#ffad00');
  bg.addColorStop(0.5, '#ff7800');
  bg.addColorStop(1, '#ff4500');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ground
  const grd = ctx.createLinearGradient(0, 346, 0, H);
  grd.addColorStop(0, '#cc5500');
  grd.addColorStop(1, '#882200');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 346, W, H - 346);
  ctx.strokeStyle = '#aa4400';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 346);
  ctx.lineTo(W, 346);
  ctx.stroke();

  // Cave
  drawCave(ctx);

  // Pickaxe
  const pickAngle = Math.sin(t) * 0.45 - 0.15;
  const pickX = 348, pickY = 166;
  const glowX = pickX + 66, glowY = pickY + 4;

  // Glow behind gem cluster
  const glowR = 72 + Math.sin(t) * 8;
  const gl = ctx.createRadialGradient(glowX, glowY, 8, glowX, glowY, glowR);
  gl.addColorStop(0, 'rgba(167,139,250,0.55)');
  gl.addColorStop(0.6, 'rgba(124,58,237,0.22)');
  gl.addColorStop(1, 'rgba(76,29,149,0)');
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.arc(glowX, glowY, glowR, 0, Math.PI * 2);
  ctx.fill();

  // Many gems behind pickaxe
  for (const g of clusterGems) {
    const w = Math.sin(t + g.phase) * 2.5;
    drawGem(ctx, glowX + g.ox + w, glowY + g.oy + w * 0.5, g.size);
  }

  // Pickaxe on top
  drawPickaxe(ctx, pickAngle, pickX, pickY);

  // Flying gems on right
  for (const g of flyingGems) {
    const b = Math.sin(t + g.phase) * 4;
    drawGem(ctx, g.x, g.y + b, g.size);
  }

  // Cart
  drawCart(ctx);
  // Gem in cart
  drawGem(ctx, 368, 245, 40);
}

// ── Live preview animation ───────────────────────────────────────────────────
let frame = 0;
function animate() {
  const t = (frame / FRAMES) * Math.PI * 2;
  drawFrame(ctx, t);
  frame = (frame + 1) % FRAMES;
  requestAnimationFrame(animate);
}
animate();

// ── GIF generation using gif.js ──────────────────────────────────────────────
document.getElementById('genBtn').addEventListener('click', generateGIF);

function generateGIF() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generating... 0%';
  document.getElementById('status').textContent = 'Encoding GIF — please wait...';

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js';
  script.onload = () => startEncoding(btn);
  script.onerror = () => {
    // Fallback: use inline GIF worker
    startEncodingFallback(btn);
  };
  document.head.appendChild(script);
}

function startEncoding(btn) {
  const gif = new GIF({
    workers: 2,
    quality: 8,
    width: W,
    height: H,
    workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js',
  });

  const offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d');

  for (let f = 0; f < FRAMES; f++) {
    const t = (f / FRAMES) * Math.PI * 2;
    drawFrame(offCtx, t);
    gif.addFrame(offCtx, { copy: true, delay: DELAY });
  }

  gif.on('progress', p => {
    btn.textContent = `Generating... ${Math.round(p * 100)}%`;
  });

  gif.on('finished', blob => {
    const url = URL.createObjectURL(blob);
    document.getElementById('gifImg').src = url;
    document.getElementById('dlLink').href = url;
    document.getElementById('gifPreview').style.display = 'block';
    document.getElementById('status').textContent = '✓ GIF ready! Right-click to save or click Download.';
    btn.textContent = 'Regenerate GIF';
    btn.disabled = false;
  });

  gif.render();
}

function startEncodingFallback(btn) {
  document.getElementById('status').textContent = 'CDN not available — showing animated preview above. Right-click canvas to save as image.';
  btn.textContent = 'Generate GIF';
  btn.disabled = false;
}
</script>
</body>
</html>
