<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mining Station — Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: hsl(220 14% 6%);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px 60px;
}
.page { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-bottom: 4px; }
.header-left { display: flex; align-items: center; gap: 8px; }
.header-title { font-size: 11px; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #f97316; box-shadow: 0 0 8px rgba(249,115,22,0.9); animation: pulse-dot 1.4s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
.status-label { font-size: 11px; font-weight: 700; color: #f97316; text-transform: uppercase; letter-spacing: 0.1em; }

/* HERO CARD */
.hero-card {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: linear-gradient(160deg, #0d0e15 0%, #111320 60%, #0c0d14 100%);
  border: 1px solid rgba(249,115,22,0.2);
  box-shadow: 0 0 60px rgba(249,115,22,0.08), 0 20px 40px rgba(0,0,0,0.4);
}
.blob-tr {
  position: absolute; top: -64px; right: -64px; width: 224px; height: 224px;
  border-radius: 50%; background: rgba(249,115,22,0.1); filter: blur(40px); pointer-events: none;
}
.blob-bl {
  position: absolute; bottom: -48px; left: -48px; width: 160px; height: 160px;
  border-radius: 50%; background: rgba(124,58,237,0.08); filter: blur(40px); pointer-events: none;
}

/* STATUS ROW */
.status-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.badge {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
}
.badge-active {
  background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.22); color: #f97316;
}
.badge-level {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.28);
}

/* CANVAS */
.canvas-wrap { padding: 16px 16px 8px; }
canvas { width: 100%; height: auto; display: block; border-radius: 12px; }

/* GEM COUNTER + RING */
.counter-ring-row {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.counter-col { flex: 1; min-width: 0; }
.counter-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.22em;
  color: rgba(255,255,255,0.22); font-weight: 600; margin-bottom: 8px;
}
.counter-value {
  font-size: 2.6rem; font-weight: 900; font-family: monospace; line-height: 1;
  background: linear-gradient(135deg, #fff 40%, rgba(249,115,22,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -1px;
}
.rate-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.rate-dot { width: 6px; height: 6px; border-radius: 50%; background: #f97316; box-shadow: 0 0 5px rgba(249,115,22,0.8); }
.rate-text { font-size: 11px; font-family: monospace; color: rgba(255,255,255,0.3); }
.rate-unit { color: rgba(255,255,255,0.14); }

/* RING */
.ring-wrap { position: relative; width: 136px; height: 136px; flex-shrink: 0; }
.ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.ring-time { font-size: 17px; font-weight: 900; font-family: monospace; color: #f97316; line-height: 1; }
.ring-sub { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,255,255,0.25); font-weight: 600; }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
.stat-pill {
  border-radius: 16px; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.stat-pill.accent {
  background: linear-gradient(135deg, rgba(249,115,22,0.12) 0%, rgba(249,115,22,0.04) 100%);
  border: 1px solid rgba(249,115,22,0.2);
}
.stat-pill.normal {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
}
.stat-icon {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.stat-icon.accent { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.25); color: #f97316; }
.stat-icon.normal { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
.stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,255,255,0.25); font-weight: 600; }
.stat-value { font-size: 16px; font-weight: 900; font-family: monospace; color: #fff; line-height: 1; margin-top: 2px; }
.stat-sub { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; }

/* PROGRESS BAR */
.progress-wrap { padding: 0 20px 20px; border-top: 1px solid rgba(255,255,255,0.04); }
.progress-header { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; margin-bottom: 8px; }
.progress-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.2); font-weight: 600; }
.progress-pct { font-size: 10px; font-weight: 700; font-family: monospace; color: rgba(249,115,22,0.6); }
.progress-track { width: 100%; height: 4px; background: rgba(255,255,255,0.04); border-radius: 999px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, rgba(249,115,22,0.6) 0%, #f97316 60%, #fb923c 100%);
  box-shadow: 0 0 8px rgba(249,115,22,0.5);
}

/* CLAIM BUTTON */
.claim-btn {
  width: 100%; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px; border-radius: 16px; border: none; cursor: pointer;
  font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: #fff;
  background: linear-gradient(135deg, #ea6c10 0%, #f97316 50%, #fb923c 100%);
  box-shadow: 0 6px 24px rgba(249,115,22,0.4), 0 1px 0 rgba(255,255,255,0.2) inset;
}
.claim-shine {
  position: absolute; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
  animation: shine 4s ease-in-out infinite;
}
@keyframes shine { 0%,100% { left: -60%; } 50% { left: 160%; } }

/* EXTRA STATS */
.extra-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* UPGRADE CARD */
.upgrade-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-radius: 16px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
}
.upgrade-icon {
  width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, rgba(249,115,22,0.15) 0%, rgba(249,115,22,0.05) 100%);
  border: 1px solid rgba(249,115,22,0.2);
  font-size: 18px;
}
.upgrade-title { font-size: 13px; font-weight: 700; color: #fff; }
.upgrade-sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
.upgrade-arrow {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.15);
  color: rgba(249,115,22,0.6); font-size: 14px;
}

/* RING animation */
@keyframes ring-progress {
  from { stroke-dashoffset: 339; }
  to   { stroke-dashoffset: 85; }
}
.ring-arc { animation: ring-progress 2s ease-out forwards; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 9-14 9 14"/><path d="M4.5 14.5h15"/></svg>
      <span class="header-title">Mining Station</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot"></div>
      <span class="status-label">Active</span>
    </div>
  </div>

  <!-- Hero Card -->
  <div class="hero-card">
    <div class="blob-tr"></div>
    <div class="blob-bl"></div>

    <!-- Status row -->
    <div class="status-row">
      <div class="badge badge-active">⚡ Mining</div>
      <div class="badge badge-level">💎 Miner II · Lv 2</div>
    </div>

    <!-- Canvas scene -->
    <div class="canvas-wrap">
      <canvas id="mc" width="388" height="215"></canvas>
    </div>

    <!-- Counter + Ring -->
    <div class="counter-ring-row">
      <div class="counter-col">
        <div class="counter-label">Session Gems</div>
        <div class="counter-value" id="gemCounter">0</div>
        <div class="rate-row">
          <div class="rate-dot"></div>
          <span class="rate-text">+2.31 <span class="rate-unit">gems/sec</span></span>
        </div>
      </div>
      <div class="ring-wrap">
        <svg viewBox="0 0 136 136">
          <circle cx="68" cy="68" r="54" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
          <circle class="ring-arc" cx="68" cy="68" r="54" fill="none"
            stroke="url(#rg)" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="339" stroke-dashoffset="339"/>
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f97316"/>
              <stop offset="100%" stop-color="#fb923c"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring-center">
          <div class="ring-time" id="timer">02:47:13</div>
          <div class="ring-sub">remaining</div>
        </div>
      </div>
    </div>

    <!-- Stats 2-col -->
    <div class="stats-grid">
      <div class="stat-pill accent">
        <div class="stat-icon accent">💎</div>
        <div>
          <div class="stat-label">Total Balance</div>
          <div class="stat-value">1.24M</div>
          <div class="stat-sub">gems</div>
        </div>
      </div>
      <div class="stat-pill normal">
        <div class="stat-icon normal">📊</div>
        <div>
          <div class="stat-label">Mining Rate</div>
          <div class="stat-value">200K</div>
          <div class="stat-sub">gems / day</div>
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-header">
        <div class="progress-label">⏱ Session Progress</div>
        <div class="progress-pct">72%</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:72%"></div>
      </div>
    </div>
  </div>

  <!-- Claim Button -->
  <button class="claim-btn">
    <div class="claim-shine"></div>
    💎 Claim 48,320 Gems
  </button>

  <!-- Extra Stats -->
  <div class="extra-stats">
    <div class="stat-pill normal">
      <div class="stat-icon normal">📈</div>
      <div>
        <div class="stat-label">Total Deposited</div>
        <div class="stat-value">$500</div>
        <div class="stat-sub">USDT</div>
      </div>
    </div>
    <div class="stat-pill normal">
      <div class="stat-icon normal">⏳</div>
      <div>
        <div class="stat-label">Days Remaining</div>
        <div class="stat-value">142</div>
        <div class="stat-sub">of 180-day cycle</div>
      </div>
    </div>
  </div>

  <!-- Upgrade Card -->
  <div class="upgrade-card">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="upgrade-icon">⛏️</div>
      <div>
        <div class="upgrade-title">Senior Miner</div>
        <div class="upgrade-sub">$500 USDT · Level 2</div>
      </div>
    </div>
    <div class="upgrade-arrow">›</div>
  </div>

</div>

<script>
// ── Canvas Mining Scene ─────────────────────────────────────────────────────
const canvas = document.getElementById('mc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let angle = 0, dir = 1, strikeFrame = 0, frame = 0;
const particles = [];
const GEM_COLORS = ['#a78bfa','#8b5cf6','#7c3aed','#c4b5fd','#f97316','#fb923c'];

function spawnParticles(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 3.5;
    particles.push({
      x: cx + (Math.random()-0.5)*20, y: cy + (Math.random()-0.5)*20,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.5,
      life: 1, maxLife: 0.6+Math.random()*0.8,
      size: 2.5+Math.random()*4, color: GEM_COLORS[Math.floor(Math.random()*GEM_COLORS.length)]
    });
  }
}

function drawGem(cx, cy, s, alpha=1) {
  const sc = s/40, tx = cx-s/2, ty = cy-s/2;
  function pt(x,y) { return [tx+x*sc, ty+y*sc]; }
  function poly(pts, fill, op=1) {
    ctx.save(); ctx.globalAlpha = alpha*op;
    ctx.beginPath(); ctx.moveTo(...pt(...pts[0]));
    for (let i=1;i<pts.length;i++) ctx.lineTo(...pt(...pts[i]));
    ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); ctx.restore();
  }
  poly([[20,4],[30,14],[20,10]],'#c4b5fd');
  poly([[20,4],[10,14],[20,10]],'#a78bfa',0.88);
  poly([[30,14],[20,10],[10,14]],'#8b5cf6',0.7);
  poly([[10,14],[20,10],[20,34],[6,22]],'#6d28d9');
  poly([[30,14],[20,10],[20,34],[34,22]],'#7c3aed');
  poly([[20,34],[6,22],[34,22]],'#4c1d95');
  poly([[20,5],[26,12],[22,11]],'#f97316',0.9);
}

function drawPickaxe(px, py, ang) {
  ctx.save(); ctx.translate(px, py); ctx.rotate(ang);
  const hg = ctx.createLinearGradient(0,-4,0,4);
  hg.addColorStop(0,'#c08040'); hg.addColorStop(1,'#7a4a18');
  ctx.strokeStyle=hg; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(62,0); ctx.stroke();
  const hd = ctx.createLinearGradient(60,-16,60,14);
  hd.addColorStop(0,'#e0e0e0'); hd.addColorStop(0.5,'#aaa'); hd.addColorStop(1,'#666');
  ctx.fillStyle=hd;
  ctx.beginPath(); ctx.moveTo(60,-16); ctx.lineTo(92,-6); ctx.lineTo(88,13); ctx.lineTo(60,7); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.moveTo(88,-8); ctx.lineTo(108,0); ctx.lineTo(88,8); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.moveTo(60,-16); ctx.lineTo(52,-10); ctx.lineTo(52,10); ctx.lineTo(60,7); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,-16); ctx.lineTo(92,-6); ctx.stroke();
  ctx.restore();
}

function drawRock(cx, cy) {
  const glow = ctx.createRadialGradient(cx,cy,4,cx,cy,55);
  glow.addColorStop(0,'rgba(167,139,250,0.35)');
  glow.addColorStop(0.5,'rgba(124,58,237,0.12)');
  glow.addColorStop(1,'rgba(76,29,149,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(cx,cy,55,0,Math.PI*2); ctx.fill();

  const rg = ctx.createRadialGradient(cx-10,cy-10,4,cx,cy,38);
  rg.addColorStop(0,'#3a3a4a'); rg.addColorStop(1,'#1a1a22');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.moveTo(cx-30,cy+20);
  ctx.bezierCurveTo(cx-40,cy+5,cx-38,cy-18,cx-18,cy-28);
  ctx.bezierCurveTo(cx-5,cy-38,cx+15,cy-35,cx+28,cy-18);
  ctx.bezierCurveTo(cx+40,cy-4,cx+38,cy+14,cx+28,cy+24);
  ctx.bezierCurveTo(cx+10,cy+35,cx-12,cy+34,cx-30,cy+20);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle='rgba(139,92,246,0.4)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(cx-10,cy-20); ctx.lineTo(cx+5,cy); ctx.lineTo(cx-5,cy+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12,cy-15); ctx.lineTo(cx+2,cy+5); ctx.stroke();

  const gemPos = [{ox:-8,oy:-6,s:14},{ox:10,oy:4,s:10},{ox:-2,oy:12,s:8}];
  for (const g of gemPos) drawGem(cx+g.ox, cy+g.oy, g.s, 0.75);

  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(cx-18,cy-28); ctx.lineTo(cx+28,cy-18); ctx.lineTo(cx+28,cy+24);
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // BG
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0b10'); bg.addColorStop(1,'#0d0f18');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const al = ctx.createRadialGradient(W*.5,H*.2,0,W*.5,H*.2,H*.8);
  al.addColorStop(0,'rgba(124,58,237,0.08)'); al.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=al; ctx.fillRect(0,0,W,H);

  // Ground
  const groundY = H*0.76;
  const gr = ctx.createLinearGradient(0,groundY,0,H);
  gr.addColorStop(0,'#16171f'); gr.addColorStop(1,'#0e0f14');
  ctx.fillStyle=gr; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='rgba(139,92,246,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();

  const rockX = W*0.58, rockY = H*0.46;
  frame++;

  // Pickaxe swing
  const MAX = 0.62;
  angle += 0.065 * dir;
  if (angle >= MAX) { dir = -1; if (strikeFrame===0) spawnParticles(rockX-12, rockY-5, 14); strikeFrame = 3; }
  if (angle <= -MAX*0.35) dir = 1;
  if (strikeFrame > 0) strikeFrame--;

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.025;
    if (p.life<=0) { particles.splice(i,1); continue; }
    const a = Math.max(0, p.life/p.maxLife);
    const s = p.size*a;
    ctx.save(); ctx.globalAlpha=a*0.9; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.moveTo(p.x,p.y-s); ctx.lineTo(p.x+s*0.6,p.y); ctx.lineTo(p.x,p.y+s); ctx.lineTo(p.x-s*0.6,p.y); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  drawRock(rockX, rockY);

  // Strike flash
  if (strikeFrame > 0) {
    const fl = ctx.createRadialGradient(rockX,rockY,0,rockX,rockY,48);
    fl.addColorStop(0,`rgba(249,115,22,${0.5*strikeFrame/3})`);
    fl.addColorStop(1,'rgba(249,115,22,0)');
    ctx.fillStyle=fl; ctx.beginPath(); ctx.arc(rockX,rockY,48,0,Math.PI*2); ctx.fill();
  }

  const pivX = W*0.3, pivY = H*0.37;
  drawPickaxe(pivX, pivY, angle);

  // Miner
  const mx = W*0.2, my = groundY;
  ctx.fillStyle='#1e1f28';
  ctx.beginPath(); ctx.ellipse(mx,my-22,13,22,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx,my-50,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.arc(mx,my-52,12,Math.PI,0); ctx.fill();
  ctx.fillStyle='#cc6010'; ctx.fillRect(mx-13,my-52,26,4);
  ctx.fillStyle='#ffdd00';
  ctx.beginPath(); ctx.arc(mx+8,my-58,4,0,Math.PI*2); ctx.fill();
  const lamp = ctx.createRadialGradient(mx+8,my-58,0,mx+18,my-48,28);
  lamp.addColorStop(0,'rgba(255,220,0,0.3)'); lamp.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=lamp; ctx.beginPath(); ctx.arc(mx+18,my-48,28,0,Math.PI*2); ctx.fill();

  requestAnimationFrame(draw);
}
draw();

// ── Gem counter animation ───────────────────────────────────────────────────
let gemVal = 0;
const gemTarget = 48320;
const gemEl = document.getElementById('gemCounter');
setInterval(() => {
  gemVal = Math.min(gemVal + 2.31, gemTarget);
  const v = Math.floor(gemVal);
  gemEl.textContent = v >= 1000 ? (v/1000).toFixed(1)+'K' : v;
}, 50);

// ── Timer countdown ─────────────────────────────────────────────────────────
let totalSec = 2*3600 + 47*60 + 13;
const timerEl = document.getElementById('timer');
setInterval(() => {
  if (totalSec <= 0) return;
  totalSec--;
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  timerEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}, 1000);
</script>
</body>
</html>
