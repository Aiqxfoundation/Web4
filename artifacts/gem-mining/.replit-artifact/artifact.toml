kind = "web"
previewPath = "/"
title = "ETR Gem Mining"
version = "1.0.0"
id = "artifacts/gem-mining"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20501
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gem-mining run dev"

[services.env]
PORT = "20501"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gem-mining", "run", "build"]
publicDir = "artifacts/gem-mining/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
